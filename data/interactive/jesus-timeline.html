function App() {
  const [selected, setSelected] = React.useState(null);
  const [filter, setFilter] = React.useState("all");

  const filtered = filter === "all" ? events : events.filter(e => e.phase === filter);
  const visiblePhases = phases.filter(p => filter === "all" || filter === p.id);

  return (
    <div style={{ fontFamily:"'Georgia','Times New Roman',serif", background:"linear-gradient(160deg,#1a120b 0%,#2c1a0e 40%,#1a120b 100%)", minHeight:"100vh", color:"#f0e6d3" }}>
      <div style={{ maxWidth:780, margin:"0 auto", padding:"44px 20px 70px" }}>

        {/* Header */}
        <div style={{ textAlign:"center", marginBottom:44 }}>
          <div style={{ fontSize:12, letterSpacing:6, color:"#c9a96e", textTransform:"uppercase", marginBottom:10 }}>
            KJV Bible Study
          </div>
          <h1 style={{ fontSize:"clamp(28px,5vw,46px)", fontWeight:"normal", color:"#f5deb3", margin:"0 0 8px", letterSpacing:1, lineHeight:1.2, textShadow:"0 2px 20px rgba(197,143,70,0.4)" }}>
            The Life of Jesus Christ
          </h1>
          <div style={{ color:"#a07850", fontSize:15, fontStyle:"italic" }}>
            From His Nativity to His Ascension into Glory
          </div>
          <div style={{ fontSize:13, color:"#7a5830", marginTop:4 }}>Matthew · Mark · Luke · John · Acts</div>
          <div style={{ width:80, height:1, background:"linear-gradient(90deg,transparent,#c9a96e,transparent)", margin:"18px auto 0" }}/>
        </div>

        {/* Legend dots */}
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:16 }}>
          {phases.map(p => (
            <div key={p.id} style={{ display:"flex", alignItems:"center", gap:6, background:"rgba(255,255,255,0.04)", borderRadius:20, padding:"4px 12px", fontSize:12, color:"#d4b896" }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:p.color }}/>
              {p.label}
            </div>
          ))}
        </div>

        {/* Phase filters */}
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:38 }}>
          <button onClick={()=>setFilter("all")} style={{
            padding:"5px 16px", borderRadius:20, cursor:"pointer", fontSize:12, fontFamily:"sans-serif", letterSpacing:1,
            border:`1px solid ${filter==="all"?"#c9a96e":"rgba(197,143,70,0.3)"}`,
            background: filter==="all"?"rgba(201,169,110,0.15)":"rgba(255,255,255,0.03)",
            color: filter==="all"?"#c9a96e":"#8a6a40",
          }}>All Events</button>
          {phases.map(p => (
            <button key={p.id} onClick={()=>setFilter(p.id)} style={{
              padding:"5px 14px", borderRadius:20, cursor:"pointer", fontSize:12, fontFamily:"sans-serif", letterSpacing:0.5,
              border:`1px solid ${filter===p.id?p.color:"rgba(197,143,70,0.2)"}`,
              background: filter===p.id?p.color+"22":"rgba(255,255,255,0.03)",
              color: filter===p.id?p.color:"#8a6a40",
            }}>{p.label}</button>
          ))}
        </div>

        {/* Timeline */}
        <div style={{ position:"relative" }}>
          <div style={{ position:"absolute", left:28, top:0, bottom:0, width:2, background:"linear-gradient(180deg,transparent,#c9a96e 5%,#c9a96e 95%,transparent)" }}/>

          {visiblePhases.map(phase => {
            const phaseEvents = filtered.filter(e => e.phase === phase.id);
            if (!phaseEvents.length) return null;
            return (
              <div key={phase.id}>
                {/* Phase divider */}
                <div style={{ marginLeft:52, marginTop: filter==="all"?28:4, marginBottom:10, display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ height:1, flex:1, background:`linear-gradient(90deg,${phase.color}80,transparent)` }}/>
                  <div style={{ fontSize:10, letterSpacing:5, textTransform:"uppercase", color:phase.color, fontFamily:"sans-serif", whiteSpace:"nowrap" }}>{phase.label}</div>
                  <div style={{ width:16, height:1, background:`${phase.color}40` }}/>
                </div>

                {phaseEvents.map(ev => {
                  const isSelected = selected === ev.id;
                  return (
                    <div key={ev.id} style={{ position:"relative", marginBottom:8 }}>
                      <div style={{
                        position:"absolute", left:20, top:22, width:18, height:18, borderRadius:"50%",
                        background: isSelected ? phase.color : "#1a120b",
                        border:`2px solid ${phase.color}`,
                        boxShadow: isSelected ? `0 0 12px ${phase.color}` : `0 0 6px ${phase.color}60`,
                        zIndex:2, transition:"all 0.2s",
                      }}/>

                      <div onClick={()=>setSelected(isSelected ? null : ev.id)} style={{
                        marginLeft:52,
                        background: isSelected ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.04)",
                        border:`1px solid ${isSelected ? phase.color : "rgba(197,143,70,0.18)"}`,
                        borderRadius:10, padding:"14px 18px", cursor:"pointer",
                        transition:"all 0.25s ease",
                        boxShadow: isSelected ? "0 4px 24px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05)" : "none",
                      }}>
                        <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                          <div style={{ fontSize:24, lineHeight:1, flexShrink:0, marginTop:3 }}>{ev.icon}</div>
                          <div style={{ flex:1 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:4 }}>
                              <span style={{ fontSize:10, letterSpacing:3, textTransform:"uppercase", color:phase.color, fontFamily:"sans-serif" }}>{ev.year}</span>
                              <span style={{ fontSize:10, background:phase.color+"25", color:phase.color, padding:"1px 9px", borderRadius:10, fontFamily:"sans-serif" }}>{ev.ref}</span>
                            </div>
                            <div style={{ fontSize:17, fontWeight:"bold", color:"#f5deb3", marginBottom:6 }}>{ev.title}</div>
                            <div style={{ fontSize:13.5, color:"#b89a78", lineHeight:1.75 }}>{ev.summary}</div>
                          </div>
                          <div style={{ color:"#c9a96e", fontSize:18, flexShrink:0, transform:isSelected?"rotate(180deg)":"rotate(0)", transition:"transform 0.25s" }}>▾</div>
                        </div>

                        {isSelected && (
                          <div className="fade-in" style={{ marginTop:16, paddingTop:16, borderTop:"1px solid rgba(197,143,70,0.2)" }}>
                            <p style={{ fontSize:14.5, color:"#d4b896", lineHeight:1.85, margin:"0 0 16px", textAlign:"justify" }}>{ev.detail}</p>
                            <div style={{ background:"rgba(0,0,0,0.3)", borderLeft:`3px solid ${phase.color}`, padding:"12px 16px", borderRadius:"0 8px 8px 0" }}>
                              <div style={{ fontSize:13.5, fontStyle:"italic", color:"#e8d5b8", lineHeight:1.8 }}>{ev.verse}</div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>

        <div style={{ textAlign:"center", marginTop:52, color:"#6b4f35", fontSize:12, fontStyle:"italic", lineHeight:1.8 }}>
          Tap any event to expand details &amp; scripture · Filter by phase above<br/>
          <span style={{ color:"#4a3020" }}>26 key events · Nativity to Ascension · KJV</span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
